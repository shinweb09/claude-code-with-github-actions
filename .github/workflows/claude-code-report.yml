name: "Claude Code Report"

# Generates a summary report of all workflow runs in this repository.
# Results are shown in the Actions tab Job Summary.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"  # Daily at midnight UTC

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch workflow run data
        id: fetch-runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list \
            --repo ${{ github.repository }} \
            --limit 50 \
            --json name,status,conclusion,createdAt,updatedAt,displayTitle,url,databaseId \
            > /tmp/workflow-runs.json
          echo "Fetched $(jq length /tmp/workflow-runs.json) runs"
          cat /tmp/workflow-runs.json

      - name: Run Claude Code Report
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            Read the file /tmp/workflow-runs.json which contains recent GitHub Actions workflow run data.

            Generate a comprehensive Claude Code Report and write it to $GITHUB_STEP_SUMMARY using this exact bash command:
            cat >> $GITHUB_STEP_SUMMARY << 'REPORT'
            (your markdown content here)
            REPORT

            The report must include these sections in markdown:

            # 🤖 Claude Code Report
            **Generated**: (current datetime)
            **Repository**: ${{ github.repository }}

            ## 📊 실행 요약 (Execution Summary)
            - 총 실행 횟수, 성공/실패 수, 성공률

            ## ✅ 워크플로우별 실행 현황 (Workflow Status)
            A markdown table with columns: 워크플로우 | 최근 상태 | 실행 시간 | 링크
            Group runs by workflow name, show latest status for each.

            ## 📋 전체 실행 이력 (Run History)
            A markdown table with columns: # | 이름 | 상태 | 결론 | 시작 시간 | 링크
            List all runs chronologically (newest first), use ✅ for success, ❌ for failure, 🔄 for in_progress.

            ## 💡 분석 및 인사이트 (Analysis & Insights)
            Brief analysis of the workflow runs - patterns, recommendations, any issues noticed.

            ---
            *Report generated by Claude Code Action*

            Important: Write the entire report to $GITHUB_STEP_SUMMARY so it appears in the Actions tab.
